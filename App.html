<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST LOGIN BETANGAR</title>
<style>
body { background: #08111f; color: #e8f4ff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
.box { background: #0d1e3a; border: 1px solid #2a5080; border-radius: 16px; padding: 32px; width: 320px; }
h2 { color: #a3e635; text-align: center; margin-bottom: 20px; }
input { width: 100%; background: #0f2040; border: 1px solid #1e3a5f; color: #e8f4ff; font-size: 14px; padding: 11px 14px; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; }
button { width: 100%; background: #a3e635; color: #000; border: none; padding: 13px; border-radius: 8px; font-size: 14px; font-weight: 800; cursor: pointer; }
#msg { margin-top: 12px; padding: 8px; border-radius: 6px; text-align: center; font-size: 13px; display: none; }
.ok { background: rgba(45,255,122,.1); color: #a3e635; border: 1px solid #a3e635; }
.err { background: rgba(248,113,113,.1); color: #f87171; border: 1px solid #f87171; }
#log { margin-top: 16px; font-size: 10px; color: #7eb8d4; background: #060e1a; padding: 8px; border-radius: 6px; min-height: 40px; word-break: break-all; }
</style>
</head>
<body>
<div class="box">
  <h2>TEST LOGIN</h2>
  <input type="text" id="u" placeholder="usuario" value="maxbetangar">
  <input type="password" id="p" placeholder="contrasena" value="betangar2026">
  <button onclick="testLogin()">PROBAR LOGIN</button>
  <div id="msg"></div>
  <div id="log">Esperando...</div>
</div>

<script>
var log = document.getElementById('log');
var msg = document.getElementById('msg');

function addLog(txt) {
  log.textContent = log.textContent + '\n' + txt;
}

addLog('JS cargado OK');

var USUARIOS = {
  'maxbetangar':   {pass:'betangar2026', rol:'admin'},
  'frankbetangar': {pass:'betangar2026', rol:'admin'},
  'operador1':     {pass:'opera2026',    rol:'operador'},
  'operador2':     {pass:'opera2027',    rol:'operador'},
  'betangarvisor': {pass:'vista2026',    rol:'visualizador'}
};

addLog('Usuarios cargados: ' + Object.keys(USUARIOS).length);

function testLogin() {
  addLog('--- Click detectado ---');
  var u = document.getElementById('u').value.trim().toLowerCase();
  var p = document.getElementById('p').value;
  addLog('Usuario: ' + u);
  addLog('Pass length: ' + p.length);

  if (!USUARIOS[u]) {
    addLog('ERROR: usuario no existe');
    msg.className = 'err';
    msg.textContent = 'Usuario no existe';
    msg.style.display = 'block';
    return;
  }

  if (USUARIOS[u].pass !== p) {
    addLog('ERROR: pass incorrecta');
    msg.className = 'err';
    msg.textContent = 'Contrasena incorrecta';
    msg.style.display = 'block';
    return;
  }

  addLog('LOGIN OK - rol: ' + USUARIOS[u].rol);
  msg.className = 'ok';
  msg.textContent = 'LOGIN CORRECTO - Rol: ' + USUARIOS[u].rol;
  msg.style.display = 'block';
}

addLog('Funcion testLogin lista');
</script>

</body>
</html>
