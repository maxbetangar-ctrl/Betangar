name: tests
# Corre las pruebas (sintaxis + matemática de dinero) en cada push y PR.
# Si algo falla, queda marcado en rojo en GitHub → no se mergea/despliega a ciegas.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sintaxis + pruebas
        run: npm test
